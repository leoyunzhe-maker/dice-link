<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dice MTL</title>
<style>
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
background:#120e1c;color:#fff;font-family:-apple-system,'Segoe UI',sans-serif;text-align:center;padding:24px}
.logo{width:88px;height:88px;border-radius:22px;margin-bottom:20px}
h1{font-size:22px;margin:0 0 6px}p{color:#cfc4e6;font-size:15px;margin:0 0 26px}
a.btn{display:inline-block;padding:14px 34px;border-radius:999px;color:#fff;text-decoration:none;
font-weight:700;background:linear-gradient(90deg,#ff8a5c,#ff5d8f,#a06bff)}
</style></head><body>
<img class="logo" src="icon.png" alt="">
<h1>Opening Dice MTL…</h1>
<p>Join this event in the app</p>
<a class="btn" id="store" href="https://apps.apple.com/ca/app/dice-mtl/id6789398839">Get Dice MTL</a>
<script>
var id=new URLSearchParams(location.search).get('id')||'';
var deep='dice://activity/'+encodeURIComponent(id);
if(!id){document.querySelector('h1').textContent='Dice MTL';}
else{
  var t=Date.now();
  location.href=deep;
  setTimeout(function(){
    // 若 1.2s 后仍在本页(app 未安装或未拉起),跳商店
    if(Date.now()-t<3500 && !document.hidden){
      location.href='https://apps.apple.com/ca/app/dice-mtl/id6789398839';
    }
  },1200);
}
</script></body></html>
